<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系館器材借用系統 / Equipment Borrowing System</title>
    <style>
        :root {
            --bg: #f6f3ef;
            --ink: #1f1b16;
            --muted: #6b6258;
            --accent: #2f6f4e;
            --border: #e2d7cb;
        }

        body {
            font-family: "Noto Sans TC", "Segoe UI", sans-serif;
            padding: 20px;
            max-width: 980px;
            margin: auto;
            background: radial-gradient(1200px 400px at 10% 0%, #fff8ef 0%, transparent 60%), var(--bg);
            color: var(--ink);
        }
        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 160px; /* 確保在表格內有足夠寬度 */
            padding: 5px;
        }

        .chip {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            background: #fff;
            font-size: 12px;
            transition: all 0.2s ease;
            user-select: none;
            text-align: center;
            flex: 1 0 30%; /* 讓它在格子內整齊排列 */
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chip.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 4px rgba(47, 111, 78, 0.2);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 10px; border: 1px solid var(--border); }
        .record-table input { min-width: 120px; }
        button { background-color: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; }
        button:hover { filter: brightness(0.95); }
        .hidden { display: none; }
        .suggestions { border: 1px solid var(--border); background: #fff; max-height: 160px; overflow-y: auto; }
        .suggestions.hidden { display: none; }
        .suggestion-item { padding: 8px; cursor: pointer; }
        .suggestion-item:hover { background: #f0f0f0; }
        .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 14px; background: #fff; }
        table { width: 100%; min-width: 980px; border-collapse: collapse; }
        th, td { border-bottom: 1px solid var(--border); padding: 10px; font-size: 13px; text-align: left; vertical-align: top; }
        th { background: #fdf6ee; position: sticky; top: 0; z-index: 2; }
        #inputRow td { position: sticky; top: 46px; background: #fff; z-index: 1; }
        .checkbox-cell { text-align: center; }
        .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .item-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .item-input { margin-top: 6px; }
        .toggle-btn { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-weight: 600; color: var(--ink); }
        .toggle-btn.active { background: var(--accent); color: #fff; }
        .laptop-select { min-width: 140px; height: 120px; padding: 8px; }
        .auto-text { color: var(--muted); font-size: 12px; text-align: center; }
        #message { margin-top: 15px; color: var(--accent); }
    </style>
</head>
<body>
    <h2>器材借用系統 / Equipment Borrowing System</h2>

    <div class="form-group table-wrap">
        <table class="record-table">
            <thead>
                <tr>
                    <th>教室<br>Classroom</th>
                    <th>筆電<br>Laptop (PC1-13)</th>
                    <th>其他器材<br>Other Items</th>
                    <th>學號/員工編號<br>ID number</th>
                    <th>姓名<br>Name</th>
                    <th>連絡電話/分機<br>Contact number</th>
                    <th>借用時間(自動)<br>Borrowing time(AUTO)</th>
                    <th>歸還時間(自動)<br>Return time(AUTO)</th>
                    <th>操作<br>Action</th>
                </tr>
            </thead>
            <tbody id="recordsTable">
                <tr id="inputRow">
                    <td><input type="text" id="classroom"></td>
                    <td>
                        <div id="pcGroup" class="chip-group"></div>
                        <input type="hidden" id="selectedPcs">
                    </td>
                    <td>
                        <div class="item-group">
                            <button type="button" class="toggle-btn" id="itemAdapter">轉接線<br>Adapter</button>
                            <button type="button" class="toggle-btn" id="itemPointer">投影筆<br>Pointer</button>
                            <button type="button" class="toggle-btn" id="itemOther">其他<br>Other</button>
                        </div>
                        <input type="text" id="otherItem" class="item-input hidden">
                    </td>
                    <td>
                        <input type="text" id="borrowerId">
                        <div id="userSuggestions" class="suggestions hidden"></div>
                    </td>
                    <td><input type="text" id="borrowerName"></td>
                    <td><input type="tel" id="phone"></td>
                    <td class="auto-text">AUTO</td>
                    <td class="auto-text">--</td>
                    <td><button onclick="submitBorrow()">提交借用<br>Submit Borrow</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="form-group">
        <button onclick="fetchOverviewRecords()">重新載入總覽 (Reload Overview)</button>
    </div>
    <div id="message"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxaRR-acYIle82Ryu1GpDX-DIRAF762xg8dJK0QhDyanXtumJv4-Z21r3Ipky1Zn1sb/exec"; // 👈 貼上你的 GAS 網址

        let usersCache = [];
        let usersById = {};

        window.onload = function() {
            renderPcOptions();
            wireItemToggles();
            fetchUsers().then(fetchOverviewRecords);
            const borrowerIdInput = document.getElementById('borrowerId');
            borrowerIdInput.addEventListener('input', handleBorrowerSearch);
            borrowerIdInput.addEventListener('blur', () => {
                setTimeout(() => hideSuggestions(), 150);
            });
        };

        function renderPcOptions() {
            const container = document.getElementById('pcGroup');
            const hiddenInput = document.getElementById('selectedPcs');
            container.innerHTML = '';
            let selected = [];

            for (let i = 1; i <= 13; i += 1) {
                const chip = document.createElement('div');
                const value = `PC${i}`;
                chip.className = 'chip';
                chip.textContent = value;
                chip.addEventListener('click', () => {
                    chip.classList.toggle('active');
                    if (selected.includes(value)) {
                        selected = selected.filter(item => item !== value);
                    } else {
                        selected.push(value);
                    }
                    hiddenInput.value = JSON.stringify(selected);
                });
                container.appendChild(chip);
            }
        }

        function wireItemToggles() {
            const adapterBtn = document.getElementById('itemAdapter');
            const pointerBtn = document.getElementById('itemPointer');
            const otherBtn = document.getElementById('itemOther');
            const otherInput = document.getElementById('otherItem');

            adapterBtn.addEventListener('click', () => adapterBtn.classList.toggle('active'));
            pointerBtn.addEventListener('click', () => pointerBtn.classList.toggle('active'));
            otherBtn.addEventListener('click', () => {
                otherBtn.classList.toggle('active');
                otherInput.classList.toggle('hidden', !otherBtn.classList.contains('active'));
            });
        }

        async function fetchUsers() {
            try {
                const response = await fetch(`${GAS_URL}?action=getUsers`);
                const users = await response.json();
                usersCache = Array.isArray(users) ? users : [];
                usersById = {};
                usersCache.forEach(user => {
                    if (user.borrowerId) {
                        usersById[String(user.borrowerId)] = user;
                    }
                });
            } catch (error) {
                console.error("載入使用者失敗:", error);
                usersCache = [];
                usersById = {};
            }
        }

        function handleBorrowerSearch(e) {
            const query = e.target.value.trim();
            if (!query) {
                hideSuggestions();
                return;
            }

            const results = usersCache
                .filter(user => String(user.borrowerId || "").includes(query))
                .slice(0, 8);

            renderSuggestions(results);
        }

        function renderSuggestions(results) {
            const box = document.getElementById('userSuggestions');
            if (!results.length) {
                hideSuggestions();
                return;
            }

            box.innerHTML = '';
            results.forEach(user => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = `${user.borrowerId || ''}`;
                item.addEventListener('click', () => applyUser(user));
                box.appendChild(item);
            });
            box.classList.remove('hidden');
        }

        function hideSuggestions() {
            const box = document.getElementById('userSuggestions');
            box.classList.add('hidden');
            box.innerHTML = '';
        }

        function applyUser(user) {
            document.getElementById('borrowerName').value = user.borrowerName || '';
            document.getElementById('borrowerId').value = user.borrowerId || '';
            document.getElementById('phone').value = user.phone || '';
            if (user.classroom) {
                document.getElementById('classroom').value = user.classroom || '';
            }
            hideSuggestions();
        }

        async function submitBorrow() {
            const borrowerId = document.getElementById('borrowerId').value.trim();
            const borrowerName = document.getElementById('borrowerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const classroom = document.getElementById('classroom').value.trim();
            const items = [];
            const selectedPcs = document.getElementById('selectedPcs').value;
            const pcs = selectedPcs ? JSON.parse(selectedPcs) : [];
            pcs.forEach(pc => items.push(pc));
            if (document.getElementById('itemAdapter').classList.contains('active')) {
                items.push('轉接線');
            }
            if (document.getElementById('itemPointer').classList.contains('active')) {
                items.push('投影筆');
            }
            if (document.getElementById('itemOther').classList.contains('active')) {
                const otherItem = document.getElementById('otherItem').value.trim();
                if (otherItem) {
                    parseOtherItems(otherItem).forEach(item => items.push(item));
                }
            }

            if (!borrowerId || !borrowerName || !phone || !classroom || items.length === 0) {
                alert("請填寫學號/員工編號、姓名、連絡電話、教室，並至少選擇一項器材！ / Please complete ID, name, phone, classroom, and select items.");
                return;
            }

            document.getElementById('message').innerText = "處理中... / Processing...";

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'borrow', borrowerId, borrowerName, phone, classroom, items, note: '' })
                });
                const result = await response.json();

                if (result.result === 'success') {
                    alert("提交成功/ submit successfully");
                    document.getElementById('message').innerText = '';
                    await fetchUsers();
                    fetchOverviewRecords();
                    resetBorrowForm();
                } else {
                    document.getElementById('message').innerText = result.message || "提交失敗，請檢查網路。 / Submission failed.";
                }
            } catch (error) {
                document.getElementById('message').innerText = "提交失敗，請檢查網路。 / Submission failed.";
            }
        }

        function parseOtherItems(rawValue) {
            return rawValue
                .split(/[,，、]/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function resetBorrowForm() {
            document.getElementById('classroom').value = '';
            document.getElementById('borrowerId').value = '';
            document.getElementById('borrowerName').value = '';
            document.getElementById('phone').value = '';
            const otherInput = document.getElementById('otherItem');
            otherInput.value = '';
            otherInput.classList.add('hidden');
            document.getElementById('itemAdapter').classList.remove('active');
            document.getElementById('itemPointer').classList.remove('active');
            document.getElementById('itemOther').classList.remove('active');
            document.getElementById('selectedPcs').value = '';
            document.querySelectorAll('#pcGroup .chip').forEach(chip => chip.classList.remove('active'));
        }

        // 8. 總覽 (GET)
        async function fetchOverviewRecords() {
            const table = document.getElementById('recordsTable');
            const inputRow = document.getElementById('inputRow');
            table.innerHTML = '';
            table.appendChild(inputRow);
            try {
                const response = await fetch(`${GAS_URL}?action=getAllRecords`);
                const records = await response.json();
                if (!Array.isArray(records) || records.length === 0) {
                    const row = document.createElement('tr');
                    row.innerHTML = '<td colspan="9">沒有紀錄。 / No records.</td>';
                    table.appendChild(row);
                    return;
                }

                records.sort((a, b) => {
                    const aReturned = Boolean(a.returnTime);
                    const bReturned = Boolean(b.returnTime);
                    if (aReturned === bReturned) {
                        return 0;
                    }
                    return aReturned ? 1 : -1;
                });

                records.forEach(record => {
                    const row = document.createElement('tr');
                    const itemsArray = getItemsArray(record.items);
                    const user = usersById[String(record.borrowerId)] || {};
                    row.appendChild(createTextCell(record.classroom || ''));
                    row.appendChild(createTextCell(getLaptopItems(itemsArray).join('、')));
                    row.appendChild(createTextCell(getOtherItems(itemsArray).join('、')));
                    row.appendChild(createTextCell(user.borrowerName || ''));
                    row.appendChild(createTextCell(record.borrowerId || ''));
                    row.appendChild(createTextCell(user.phone || ''));
                    row.appendChild(createTextCell(formatDateTime(record.borrowTime), 'auto-text'));

                    row.appendChild(createTextCell(formatDateTime(record.returnTime), 'auto-text'));
                    row.appendChild(createActionCell(record));
                    table.appendChild(row);
                });
            } catch (error) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="9">載入失敗，請稍後再試。 / Failed to load.</td>';
                table.appendChild(row);
            }
        }

        function formatItems(itemsValue) {
            const items = getItemsArray(itemsValue);
            return items.join('、');
        }

        function formatDateTime(value) {
            if (!value) {
                return '';
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return String(value);
            }

            return date.toLocaleString('zh-TW', {
                month: 'numeric',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        function getItemsArray(itemsValue) {
            if (!itemsValue) {
                return [];
            }

            if (Array.isArray(itemsValue)) {
                return itemsValue.map(item => String(item).trim()).filter(Boolean);
            }

            if (typeof itemsValue === 'string') {
                try {
                    const parsed = JSON.parse(itemsValue);
                    if (Array.isArray(parsed)) {
                        return parsed.map(item => String(item).trim()).filter(Boolean);
                    }
                } catch (error) {
                    return parseOtherItems(itemsValue);
                }
            }

            return [String(itemsValue).trim()].filter(Boolean);
        }

        function isLaptopItem(item) {
            return /^PC\d+$/i.test(item);
        }

        function getLaptopItems(itemsArray) {
            return itemsArray.filter(isLaptopItem);
        }

        function getOtherItems(itemsArray) {
            return itemsArray.filter(item => !isLaptopItem(item));
        }

        function createTextCell(text, className) {
            const td = document.createElement('td');
            if (className) {
                td.className = className;
            }
            td.textContent = text;
            return td;
        }

        function createActionCell(record) {
            const td = document.createElement('td');
            td.className = 'checkbox-cell';
            if (record.returnTime) {
                td.textContent = '已歸還 / Returned';
                return td;
            }

            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = '歸還 / Return';
            button.addEventListener('click', () => returnRecord(record.recordId, button));
            td.appendChild(button);
            return td;
        }

        async function returnRecord(recordId, button) {
            button.disabled = true;
            document.getElementById('message').innerText = "提交中... / Submitting...";
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'return', recordIds: [recordId] })
                });
                const result = await response.json();
                if (result.result === 'success') {
                    document.getElementById('message').innerText = '';
                    alert('歸還成功 / Return completed');
                    fetchOverviewRecords();
                } else {
                    button.disabled = false;
                    document.getElementById('message').innerText = result.message || "提交失敗，請檢查網路。 / Submission failed.";
                }
            } catch (error) {
                button.disabled = false;
                document.getElementById('message').innerText = "提交失敗，請檢查網路。 / Submission failed.";
            }
        }
    </script>
</body>
</html>
