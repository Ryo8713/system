<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育館教室器材借用系統</title>
    <style>
        :root {
            --bg: #f6f3ef;
            --ink: #1f1b16;
            --muted: #6b6258;
            --accent: #2f6f4e;
            --border: #e2d7cb;
        }

        body {
            font-family: "Noto Sans TC", "Segoe UI", sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            margin: auto;
            background: radial-gradient(1200px 400px at 10% 0%, #fff8ef 0%, transparent 60%), var(--bg);
            color: var(--ink);
        }

        .form-group { margin-bottom: 15px; }
        .button-group { display: grid; gap: 12px; }

        input, button {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { filter: brightness(0.95); }

        .page-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        #message {
            color: var(--accent);
            font-weight: 600;
        }

        .table-wrap {
            overflow-x: auto;
            overflow-y: auto;
            height: calc(100vh - 260px);
            min-height: 320px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            border-bottom: 1px solid var(--border);
            padding: 10px;
            font-size: 15px;
            text-align: center;
            vertical-align: middle;
            word-break: break-word;
        }

        th {
            background: #fdf6ee;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .record-table input { min-width: 120px; }
        .checkbox-cell { text-align: center; }
        .auto-text { color: var(--muted); font-size: 14px; text-align: center; white-space: nowrap; }
        .record-row:nth-child(even) { background: #f4f2f2; }
        .record-row:nth-child(odd) { background: #ffffff; }

        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 160px;
            padding: 5px;
        }

        .chip {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            background: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
            user-select: none;
            text-align: center;
            flex: 1 0 30%;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chip.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 4px rgba(47, 111, 78, 0.2);
        }


        .item-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .item-input { margin-top: 6px; }

        .toggle-btn {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            color: var(--ink);
        }

        .toggle-btn.active { background: var(--accent); color: #fff; }

        .suggestions {
            border: 1px solid var(--border);
            background: #fff;
            max-height: 160px;
            overflow-y: auto;
        }

        .suggestions.hidden { display: none; }
        .suggestion-item { padding: 8px; cursor: pointer; }
        .suggestion-item:hover { background: #f0f0f0; }

        .hidden { display: none; }

        @media (max-width: 1024px) {
            body {
                padding: 12px;
            }

            .table-wrap {
                height: calc(100vh - 220px);
            }

            th,
            td {
                padding: 8px;
                font-size: 13px;
            }

            .record-table input {
                min-width: 80px;
                padding: 8px;
            }

            .chip-group {
                min-width: 120px;
            }

            .chip {
                flex: 1 0 40%;
                padding: 5px 8px;
                font-size: 12px;
            }

            .toggle-btn {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h2 class="page-title">教育館教室器材借用系統 Classroom Borrowing System<span id="message"></span></h2>

    <div class="form-group table-wrap">
        <table class="record-table">
            <thead>
                <tr>
                    <th>教室<br>Classroom</th>
                    <th>筆電<br>Laptop</th>
                    <th>其他器材<br>Other items</th>
                    <th>學號/員工編號<br>ID number</th>
                    <th>姓名<br>Name</th>
                    <th>連絡電話/分機<br>Contact number</th>
                    <th>借用時間<br>(自動)<br>Borrowing time(AUTO)</th>
                    <th>歸還時間<br>(自動)<br>Return time(AUTO)</th>
                    <th>操作<br>Action</th>
                </tr>
            </thead>
            <tbody id="recordsTable">
                <tr id="inputRow">
                    <td><input type="text" id="classroom"></td>
                    <td>
                        <div id="pcGroup" class="chip-group"></div>
                        <input type="hidden" id="selectedPcs">
                    </td>
                    <td>
                        <div class="item-group">
                            <button type="button" class="toggle-btn" id="itemAdapter">轉接線<br>Adapter</button>
                            <button type="button" class="toggle-btn" id="itemPointer">投影筆<br>Pointer</button>
                            <button type="button" class="toggle-btn" id="itemOther">其他<br>Other</button>
                        </div>
                        <input type="text" id="otherItem" class="item-input hidden" placeholder="e.g. 響鈴、麥克風">
                    </td>
                    <td>
                        <input type="text" id="borrowerId">
                        <div id="userSuggestions" class="suggestions hidden"></div>
                    </td>
                    <td><input type="text" id="borrowerName"></td>
                    <td><input type="tel" id="phone"></td>
                    <td class="auto-text">AUTO</td>
                    <td class="auto-text">--</td>
                    <td><button onclick="submitBorrow()">送出<br>Send</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="form-group button-group">
        <button onclick="fetchOverviewRecords()">重新載入總覽 (Reload Overview)</button>
        <button onclick="clearAllRecords()">清除所有紀錄 (Clear All Records)</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxaRR-acYIle82Ryu1GpDX-DIRAF762xg8dJK0QhDyanXtumJv4-Z21r3Ipky1Zn1sb/exec"; // 👈 貼上你的 GAS 網址

        const DOM = {};
        let usersCache = [];
        let usersById = {};

        window.onload = init;

        function init() {
            cacheDom();
            renderPcOptions();
            wireItemToggles();
            fetchUsers().then(fetchOverviewRecords);
            wireBorrowerSearch();
        }

        function cacheDom() {
            DOM.classroom = document.getElementById('classroom');
            DOM.pcGroup = document.getElementById('pcGroup');
            DOM.selectedPcs = document.getElementById('selectedPcs');
            DOM.itemAdapter = document.getElementById('itemAdapter');
            DOM.itemPointer = document.getElementById('itemPointer');
            DOM.itemOther = document.getElementById('itemOther');
            DOM.otherItem = document.getElementById('otherItem');
            DOM.borrowerId = document.getElementById('borrowerId');
            DOM.borrowerName = document.getElementById('borrowerName');
            DOM.phone = document.getElementById('phone');
            DOM.userSuggestions = document.getElementById('userSuggestions');
            DOM.message = document.getElementById('message');
            DOM.recordsTable = document.getElementById('recordsTable');
            DOM.inputRow = document.getElementById('inputRow');
        }

        function wireBorrowerSearch() {
            DOM.borrowerId.addEventListener('input', handleBorrowerSearch);
            DOM.borrowerId.addEventListener('blur', () => {
                setTimeout(() => hideSuggestions(), 150);
            });
        }

        function renderPcOptions() {
            const container = DOM.pcGroup;
            const hiddenInput = DOM.selectedPcs;
            container.innerHTML = '';
            let selected = [];

            for (let i = 1; i <= 12; i += 1) {
                const chip = document.createElement('div');
                const value = `PC${i}`;
                chip.className = 'chip';
                chip.textContent = value;
                chip.addEventListener('click', () => {
                    chip.classList.toggle('active');
                    if (selected.includes(value)) {
                        selected = selected.filter(item => item !== value);
                    } else {
                        selected.push(value);
                    }
                    hiddenInput.value = JSON.stringify(selected);
                });
                container.appendChild(chip);
            }
        }

        function wireItemToggles() {
            DOM.itemAdapter.addEventListener('click', () => DOM.itemAdapter.classList.toggle('active'));
            DOM.itemPointer.addEventListener('click', () => DOM.itemPointer.classList.toggle('active'));
            DOM.itemOther.addEventListener('click', () => {
                DOM.itemOther.classList.toggle('active');
                updateOtherInputVisibility();
            });
        }

        function updateOtherInputVisibility() {
            DOM.otherItem.classList.toggle('hidden', !DOM.itemOther.classList.contains('active'));
        }

        async function fetchUsers() {
            try {
                const response = await fetch(`${GAS_URL}?action=getUsers`);
                const users = await response.json();
                usersCache = Array.isArray(users) ? users : [];
                usersById = {};
                usersCache.forEach(user => {
                    if (user.borrowerId) {
                        usersById[String(user.borrowerId)] = user;
                    }
                });
            } catch (error) {
                console.error("載入使用者失敗:", error);
                usersCache = [];
                usersById = {};
            }
        }

        function handleBorrowerSearch(e) {
            const query = e.target.value.trim();
            if (!query) {
                hideSuggestions();
                return;
            }

            const results = usersCache
                .filter(user => String(user.borrowerId || "").includes(query))
                .slice(0, 8);

            renderSuggestions(results);
        }

        function renderSuggestions(results) {
            const box = DOM.userSuggestions;
            if (!results.length) {
                hideSuggestions();
                return;
            }

            box.innerHTML = '';
            results.forEach(user => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = `${user.borrowerId || ''}`;
                item.addEventListener('click', () => applyUser(user));
                box.appendChild(item);
            });
            box.classList.remove('hidden');
        }

        function hideSuggestions() {
            const box = DOM.userSuggestions;
            box.classList.add('hidden');
            box.innerHTML = '';
        }

        function applyUser(user) {
            DOM.borrowerName.value = user.borrowerName || '';
            DOM.borrowerId.value = user.borrowerId || '';
            DOM.phone.value = user.phone || '';
            if (user.classroom) {
                DOM.classroom.value = user.classroom || '';
            }
            hideSuggestions();
        }

        async function submitBorrow() {
            const borrowerId = DOM.borrowerId.value.trim();
            const borrowerName = DOM.borrowerName.value.trim();
            const phone = DOM.phone.value.trim();
            const classroom = DOM.classroom.value.trim();
            const items = buildBorrowItems();

            if (!borrowerId || !borrowerName || !phone || !classroom || items.length === 0) {
                alert("資料填寫不完整，請檢查。 / Please complete all required fields.");
                return;
            }

            setMessage("處理中... / Processing...");

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'borrow', borrowerId, borrowerName, phone, classroom, items, note: '' })
                });
                const result = await response.json();

                if (result.result === 'success') {
                    alert("提交成功！ / Submission successful!");
                    clearMessage();
                    await fetchUsers();
                    fetchOverviewRecords();
                    resetBorrowForm();
                } else {
                    setMessage(result.message || "提交失敗。 / Submission failed.");
                }
            } catch (error) {
                setMessage("提交失敗。 / Submission failed.");
            }
        }

        function buildBorrowItems() {
            const items = [];
            const selectedPcs = DOM.selectedPcs.value;
            const pcs = selectedPcs ? JSON.parse(selectedPcs) : [];
            pcs.forEach(pc => items.push(pc));

            if (DOM.itemAdapter.classList.contains('active')) {
                items.push('轉接線');
            }
            if (DOM.itemPointer.classList.contains('active')) {
                items.push('投影筆');
            }
            if (DOM.itemOther.classList.contains('active')) {
                const otherItem = DOM.otherItem.value.trim();
                if (otherItem) {
                    parseOtherItems(otherItem).forEach(item => items.push(item));
                }
            }

            return items;
        }

        function parseOtherItems(rawValue) {
            return rawValue
                .split(/[,，、]/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function resetBorrowForm() {
            DOM.classroom.value = '';
            DOM.borrowerId.value = '';
            DOM.borrowerName.value = '';
            DOM.phone.value = '';
            DOM.otherItem.value = '';
            DOM.otherItem.classList.add('hidden');
            DOM.itemAdapter.classList.remove('active');
            DOM.itemPointer.classList.remove('active');
            DOM.itemOther.classList.remove('active');
            DOM.selectedPcs.value = '';
            document.querySelectorAll('#pcGroup .chip').forEach(chip => chip.classList.remove('active'));
        }

        async function fetchOverviewRecords() {
            const table = DOM.recordsTable;
            const inputRow = DOM.inputRow;
            table.innerHTML = '';
            table.appendChild(inputRow);
            try {
                const response = await fetch(`${GAS_URL}?action=getAllRecords`);
                const records = await response.json();
                if (!Array.isArray(records) || records.length === 0) {
                    const row = document.createElement('tr');
                    row.innerHTML = '<td colspan="9">無借用紀錄 (No records)</td>';
                    table.appendChild(row);
                    return;
                }

                records.sort((a, b) => {
                    const aReturned = Boolean(a.returnTime);
                    const bReturned = Boolean(b.returnTime);
                    if (aReturned === bReturned) {
                        return 0;
                    }
                    return aReturned ? 1 : -1;
                });

                records.forEach(record => {
                    const row = document.createElement('tr');
                    row.className = 'record-row';
                    const itemsArray = getItemsArray(record.items);
                    const user = usersById[String(record.borrowerId)] || {};
                    row.appendChild(createTextCell(record.classroom || ''));
                    row.appendChild(createTextCell(getLaptopItems(itemsArray).join('、')));
                    row.appendChild(createTextCell(getOtherItems(itemsArray).join('、')));
                    row.appendChild(createTextCell(record.borrowerId || ''));
                    row.appendChild(createTextCell(user.borrowerName || ''));
                    row.appendChild(createTextCell(user.phone || ''));
                    row.appendChild(createTextCell(formatDateTime(record.borrowTime), 'auto-text'));

                    row.appendChild(createTextCell(formatDateTime(record.returnTime), 'auto-text'));
                    row.appendChild(createActionCell(record));
                    table.appendChild(row);
                });
            } catch (error) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="9">載入失敗，請稍後再試。 / Failed to load.</td>';
                table.appendChild(row);
            }
        }

        async function clearAllRecords() {
            const password = prompt('請輸入管理員密碼 / Enter admin password');
            if (!password) {
                return;
            }

            setMessage('清除中... / Clearing...');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'clearAll', password })
                });
                const result = await response.json();
                if (result.result === 'success') {
                    clearMessage();
                    alert('已清除所有資料 / All data cleared');
                    await fetchUsers();
                    fetchOverviewRecords();
                } else {
                    setMessage(result.message || '清除失敗。 / Clear failed.');
                }
            } catch (error) {
                setMessage('清除失敗。 / Clear failed.');
            }
        }

        function formatDateTime(value) {
            if (!value) {
                return '';
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return String(value);
            }

            return date.toLocaleString('zh-TW', {
                month: 'numeric',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        function getItemsArray(itemsValue) {
            if (!itemsValue) {
                return [];
            }

            if (Array.isArray(itemsValue)) {
                return itemsValue.map(item => String(item).trim()).filter(Boolean);
            }

            if (typeof itemsValue === 'string') {
                try {
                    const parsed = JSON.parse(itemsValue);
                    if (Array.isArray(parsed)) {
                        return parsed.map(item => String(item).trim()).filter(Boolean);
                    }
                } catch (error) {
                    return parseOtherItems(itemsValue);
                }
            }

            return [String(itemsValue).trim()].filter(Boolean);
        }

        function isLaptopItem(item) {
            return /^PC\d+$/i.test(item);
        }

        function getLaptopItems(itemsArray) {
            return itemsArray.filter(isLaptopItem);
        }

        function getOtherItems(itemsArray) {
            return itemsArray.filter(item => !isLaptopItem(item));
        }

        function createTextCell(text, className) {
            const td = document.createElement('td');
            if (className) {
                td.className = className;
            }
            td.textContent = text;
            return td;
        }

        function createActionCell(record) {
            const td = document.createElement('td');
            td.className = 'checkbox-cell';
            if (record.returnTime) {
                td.textContent = '已歸還 Returned';
                return td;
            }

            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = '歸還 Return';
            button.addEventListener('click', () => returnRecord(record, button));
            td.appendChild(button);
            return td;
        }

        function buildReturnConfirmMessage(record) {
            const itemsArray = getItemsArray(record.items);
            const user = usersById[String(record.borrowerId)] || {};
            const lines = [
                "請問您是否確認歸還？",
                `教室: ${record.classroom || ''}`,
                `借用器材: ${itemsArray.join('、') || ''}`,
                `學號/員工編號: ${record.borrowerId || ''}`,
                `姓名: ${user.borrowerName || ''}`,
                `電話: ${user.phone || ''}`,
            ];
            return lines.join("\n");
        }

        async function returnRecord(record, button) {
            const confirmMessage = buildReturnConfirmMessage(record);
            if (!confirm(confirmMessage)) {
                return;
            }
            button.disabled = true;
            setMessage("提交中... / Submitting...");
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'return', recordIds: [record.recordId] })
                });
                const result = await response.json();
                if (result.result === 'success') {
                    clearMessage();
                    alert('歸還成功 / Return completed');
                    fetchOverviewRecords();
                } else {
                    button.disabled = false;
                    setMessage(result.message || "提交失敗。 / Submission failed.");
                }
            } catch (error) {
                button.disabled = false;
                setMessage("提交失敗。 / Submission failed.");
            }
        }

        function setMessage(text) {
            DOM.message.textContent = text;
        }

        function clearMessage() {
            DOM.message.textContent = '';
        }
    </script>
</body>
</html>
